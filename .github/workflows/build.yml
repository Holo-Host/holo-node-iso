name: Build ISO

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  setup-tools:
    runs-on: ubuntu-latest
    steps:
      # Note: We removed the Butane installation from this job since 
      # the build job runs on a fresh runner and needs its own setup anyway.
      - name: Cache coreos-installer
        id: cache-coreos-installer
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/coreos-installer
          key: coreos-installer-v0.25.0

      - name: Build coreos-installer
        if: steps.cache-coreos-installer.outputs.cache-hit != 'true'
        run: |
          cargo install coreos-installer
          ~/.cargo/bin/coreos-installer --version

  build:
    needs: setup-tools
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        arch: [x86_64, aarch64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet &
          sudo rm -rf /usr/local/lib/android &
          sudo rm -rf /opt/ghc &
          wait
          df -h

      - name: Setup Butane (Container Wrapper)
        run: |
          # Create a wrapper script so other tools can just call `butane` normally.
          # We mount the GitHub Workspace so Butane has access to your repo's files.
          # Pinned to v0.26.0 for stability, avoiding the 'latest' floating tag trap.
          cat << 'EOF' | sudo tee /usr/local/bin/butane
          #!/bin/bash
          docker run --rm -i -v "${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}" -w "$PWD" quay.io/coreos/butane:v0.26.0 "$@"
          EOF
          sudo chmod +x /usr/local/bin/butane

      - name: Restore coreos-installer from cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/coreos-installer
          key: coreos-installer-v0.25.0

      - name: Install coreos-installer
        run: |
          # Install from cache or rebuild if cache miss
          if [ ! -f ~/.cargo/bin/coreos-installer ]; then
            cargo install coreos-installer
          fi
          sudo cp ~/.cargo/bin/coreos-installer /usr/local/bin/coreos-installer
          
          # Verify both tools are working
          butane --version
          coreos-installer --version

      - name: Install curl and jq
        run: sudo apt-get install -y curl jq

      - name: Build ISO (${{ matrix.arch }})
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          chmod +x scripts/build.sh
          ./scripts/build.sh

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: holo-node-${{ matrix.arch }}-iso
          path: holo-node-${{ matrix.arch }}.iso
          retention-days: 30

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: holo-node-${{ matrix.arch }}.iso