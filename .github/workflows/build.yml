name: Build ISO

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        arch: [x86_64, aarch64]

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y curl jq

          # Butane
          curl -L \
            https://github.com/coreos/butane/releases/latest/download/butane-x86_64-unknown-linux-gnu \
            -o /usr/local/bin/butane
          chmod +x /usr/local/bin/butane

          # coreos-installer
          COREOS_URL=$(curl -sf \
            https://api.github.com/repos/coreos/coreos-installer/releases/latest \
            | jq -r '.assets[] | select(.name == "coreos-installer_x86_64") | .browser_download_url')
          curl -L "$COREOS_URL" -o /usr/local/bin/coreos-installer
          chmod +x /usr/local/bin/coreos-installer

          butane --version
          coreos-installer --version

      - name: Build ISO (${{ matrix.arch }})
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          chmod +x scripts/build.sh
          ./scripts/build.sh

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: holo-node-${{ matrix.arch }}-iso
          path: holo-node-${{ matrix.arch }}.iso
          retention-days: 30

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: holo-node-${{ matrix.arch }}.iso